<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Festrips Chatbot Versions</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,Segoe UI,sans-serif;background:linear-gradient(135deg,#09203f,#174875 52%,#eef6ff);color:#10233f}.card{width:min(720px,calc(100vw - 40px));background:white;border-radius:12px;padding:34px;box-shadow:0 24px 70px rgba(16,35,63,.24)}h1{margin:0 0 12px;font-size:42px;line-height:1}.links{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}a{display:block;padding:18px;border:1px solid #dbe3f0;border-radius:10px;text-decoration:none;color:#10233f;font-weight:800}small{display:block;margin-top:6px;color:#64748b;font-weight:500}@media(max-width:640px){.links{grid-template-columns:1fr}h1{font-size:32px}}
  </style>
</head>
<body>
  <main class="card">
    <h1>Festrips Chatbot MVP</h1>
    <p>Choose a separated prototype version.</p>
    <div class="links">
      <a href="/button/">Button FAQ Version<small>Scenario-based, no AI API cost</small></a>
      <a href="/ai/">AI API Version<small>Free-text AI response through AIHub Gateway</small></a>
    </div>
  </main>
</body>
</html>
